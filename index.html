<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detectare Mâini & Față - MediaPipe Modular</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    
    <!-- Stiluri Custom -->
    <link rel="stylesheet" href="./css/style.css">

    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>

<body>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8 d-flex flex-column align-items-center">
                <h1 class="mb-4 text-center h2">Detectare Gesturi: Mâini & Față</h1>

                <div class="card bg-dark text-white mb-4 shadow w-100" style="border-radius: 12px; max-width: 400px;">
                    <div class="card-body p-3">
                        <div class="d-flex justify-content-around align-items-center">
                            <div class="form-check form-check-inline m-0">
                                <input class="form-check-input" type="radio" name="mode" id="modeHands" value="hands" checked>
                                <label class="form-check-label fs-5 fw-bold" for="modeHands">
                                    ✋ Mâini
                                </label>
                            </div>
                            <div class="form-check form-check-inline m-0">
                                <input class="form-check-input" type="radio" name="mode" id="modeFace" value="face">
                                <label class="form-check-label fs-5 fw-bold" for="modeFace">
                                    😃 Față
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="gesture-output" class="none text-center w-100 mb-3 fs-3 fw-bold">Se inițializează camera...</div>

                <div class="video-container shadow-lg bg-black w-100">
                    <video id="input-video" autoplay playsinline></video>
                    <canvas id="output-canvas" width="640" height="480" class="w-100 h-auto"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (Optional, for components like tooltips, modals) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

    <!-- Modele și Cameră -->
    <script src="./js/models/hand-gesture.js"></script>
    <script src="./js/models/face-gesture.js"></script>
    <script src="./js/camera.js"></script>
    
    <!-- App Logic -->
    <script src="./js/app.js"></script>

</body>

</html>
